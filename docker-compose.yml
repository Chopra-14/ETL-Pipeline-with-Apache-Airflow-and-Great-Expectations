version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.2
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW_UID: ${AIRFLOW_UID:-1000}
    AIRFLOW_GID: ${AIRFLOW_GID:-1000}
    SQLITE_DB_PATH: /app/data/analytics.db
    PYTHONPATH: /opt/airflow
    # Ensure Airflow services have the same dependencies as ETL service
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas pyarrow great-expectations sqlalchemy requests pytest numpy"
  dns:
    - 8.8.8.8
    - 8.8.4.4
  volumes:
    - ./dags:/opt/airflow/dags
    - ./etl_scripts:/opt/airflow/etl_scripts
    - ./etl_scripts:/app/etl_scripts
    - ./great_expectations:/opt/airflow/great_expectations
    - ./great_expectations:/app/great_expectations
    - ./data:/app/data
  user: "${AIRFLOW_UID:-1000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow

  etl-service:
    build:
      context: .
      dockerfile: Dockerfile.etl
    environment:
      SQLITE_DB_PATH: /app/data/analytics.db
      AIRFLOW_UID: ${AIRFLOW_UID:-1000}
      AIRFLOW_GID: ${AIRFLOW_GID:-1000}
      RAW_DATA_URL: "https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/online_retail_sample.csv"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./etl_scripts:/app/etl_scripts
      - ./great_expectations:/app/great_expectations
      - ./tests:/app/tests
      - ./data:/app/data
      - ./dags:/app/dags
